<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PUBG Shop | UC | Stars | Premium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: radial-gradient(circle at 30% 10%, #1a0b2e, #0f0717);
            min-height: 100vh;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный фиолетовый фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(156, 39, 176, 0.25), transparent 70%),
                        radial-gradient(circle at 80% 70%, rgba(103, 58, 183, 0.3), transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: glowPulse 6s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
            position: relative;
            z-index: 2;
        }

        /* Header с фиолетовым свечением */
        .header {
            text-align: center;
            padding: 35px 20px;
            background: rgba(25, 15, 45, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            margin-bottom: 25px;
            border: 1px solid rgba(156, 39, 176, 0.5);
            box-shadow: 0 0 35px rgba(156, 39, 176, 0.3);
        }

        .header h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #E1BEE7, #CE93D8, #AB47BC);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(171, 71, 188, 0.5);
        }

        .version-badge {
            display: inline-block;
            background: rgba(171, 71, 188, 0.3);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            margin-top: 12px;
            border: 1px solid rgba(171, 71, 188, 0.5);
        }

        /* Вкладки */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            background: rgba(20, 10, 35, 0.7);
            padding: 8px;
            border-radius: 80px;
            backdrop-filter: blur(10px);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 14px 8px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #9C27B0, #6A1B9A);
            box-shadow: 0 0 15px rgba(156, 39, 176, 0.6);
        }

        /* Карточки товаров */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }

        .product-card {
            background: rgba(30, 20, 50, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 22px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(156, 39, 176, 0.4);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: #AB47BC;
            box-shadow: 0 0 25px rgba(171, 71, 188, 0.4);
        }

        .product-icon {
            font-size: 52px;
            margin-bottom: 12px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .product-amount {
            font-size: 24px;
            font-weight: 800;
            margin: 12px 0 8px;
            background: linear-gradient(135deg, #E1BEE7, #CE93D8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .price {
            font-size: 22px;
            font-weight: bold;
            color: #CE93D8;
            margin: 12px 0;
        }

        .buy-btn {
            background: linear-gradient(135deg, #9C27B0, #6A1B9A);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: 0.2s;
        }

        .buy-btn:active {
            transform: scale(0.96);
        }

        .premium-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: bold;
            color: #1a1a2e;
        }

        /* Корзина */
        .cart-sidebar {
            position: fixed;
            right: -100%;
            top: 0;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: rgba(20, 10, 35, 0.98);
            backdrop-filter: blur(20px);
            transition: right 0.3s;
            z-index: 10000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #9C27B0;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(156, 39, 176, 0.5);
        }

        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 35px;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }

        .cart-item button {
            background: #ef4444;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 50px;
            cursor: pointer;
        }

        .cart-total {
            padding: 20px;
            background: rgba(156, 39, 176, 0.2);
            border-radius: 20px;
            margin-top: 20px;
        }

        .checkout-btn {
            background: linear-gradient(135deg, #AB47BC, #6A1B9A);
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            margin-top: 15px;
            cursor: pointer;
        }

        /* Модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 20000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e1a2f, #120c1f);
            border-radius: 40px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid #9C27B0;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .payment-details {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 25px;
            margin: 20px 0;
        }

        .payment-details hr {
            margin: 15px 0;
            border-color: rgba(255,255,255,0.1);
        }

        .copy-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .copy-row code {
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            word-break: break-all;
            flex: 1;
        }

        .copy-btn {
            background: #9C27B0;
            padding: 8px 18px;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-pay {
            background: linear-gradient(135deg, #AB47BC, #6A1B9A);
        }
        .btn-cancel {
            background: rgba(255,255,255,0.1);
        }
        .modal-buttons button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            color: white;
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 20px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        .cart-fab {
            left: 20px;
            background: linear-gradient(135deg, #9C27B0, #6A1B9A);
        }
        .support-fab {
            right: 20px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #4ade80;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            display: none;
            z-index: 30000;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>✨ PUBG MOBILE SHOP</h1>
        <p>💎 UC | ⭐️ Звёзды | 👑 TG Premium</p>
        <div class="version-badge">🔥 V1.2 — Фиолетовое обновление 🔥</div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="uc">💎 UC</div>
        <div class="tab" data-tab="stars">⭐️ Звёзды</div>
        <div class="tab" data-tab="premium">👑 TG Premium</div>
    </div>

    <div class="products" id="products"></div>
</div>

<!-- Корзина -->
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h2>🛒 Корзина</h2>
        <button class="close-cart" onclick="closeCart()">×</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-total">
        <div style="display: flex; justify-content: space-between;">
            <span>💰 Итого:</span>
            <span id="totalAmount" style="font-size: 28px; font-weight: bold;">0 ₽</span>
        </div>
        <button class="checkout-btn" onclick="checkout()">💳 Оформить заказ</button>
    </div>
</div>

<!-- Модалка оплаты -->
<div class="modal" id="paymentModal">
    <div class="modal-content">
        <h2>💳 Оплата заказа</h2>
        <div class="payment-details">
            <p style="text-align: center; font-size: 24px;"><strong>💰 Сумма: <span id="paymentAmount" style="color: #CE93D8;">0</span> ₽</strong></p>
            <hr>
            <p><strong>💳 Карта Т-Банк:</strong></p>
            <div class="copy-row">
                <code>2200 7020 3568 7222</code>
                <button class="copy-btn" onclick="copyText('2200 7020 3568 7222')">Копировать</button>
            </div>
            <p><strong>📱 СБП (по номеру телефона):</strong></p>
            <div class="copy-row">
                <code>+7 963 701-31-60</code>
                <button class="copy-btn" onclick="copyText('+79637013160')">Копировать</button>
            </div>
        </div>
        <div class="modal-buttons">
            <button class="btn-pay" onclick="confirmPayment()">✅ Я оплатил(а)</button>
            <button class="btn-cancel" onclick="closeModal()">❌ Отмена</button>
        </div>
    </div>
</div>

<!-- Кнопки -->
<div class="fab cart-fab" onclick="openCart()">
    🛒
    <div class="cart-count" id="cartCount">0</div>
</div>
<div class="fab support-fab" onclick="window.open('https://t.me/zvqni', '_blank')">
    💬
</div>
<div class="toast" id="toast"></div>

<script>
    // ТОВАРЫ
    const products = {
        uc: [
            { amount: 60, price: 110 }, { amount: 120, price: 220 }, { amount: 180, price: 330 },
            { amount: 325, price: 460 }, { amount: 385, price: 570 }, { amount: 660, price: 900 },
            { amount: 720, price: 1010 }, { amount: 985, price: 1360 }, { amount: 1800, price: 2155 },
            { amount: 3850, price: 4200 }, { amount: 8100, price: 8060 }
        ],
        stars: [
            { amount: 13, price: 20 }, { amount: 21, price: 35 }, { amount: 43, price: 55 },
            { amount: 75, price: 105 }, { amount: 85, price: 116 }, { amount: 100, price: 137 },
            { amount: 150, price: 210 }, { amount: 200, price: 280 }, { amount: 250, price: 345 },
            { amount: 500, price: 590 }, { amount: 1000, price: 1370 }
        ],
        premium: [
            { amount: "3 месяца", price: 990, badge: "🔥 ХИТ" },
            { amount: "6 месяцев", price: 1290, badge: "💎 ЭКОНОМ" },
            { amount: "1 год", price: 2390, badge: "🎁 МЕГА СКИДКА" }
        ]
    };

    let currentTab = 'uc';
    let cart = []; // каждый элемент: { name, price, type } где type: 'uc', 'stars', 'premium'

    // Рендер товаров
    function renderProducts() {
        const container = document.getElementById('products');
        const currentProducts = products[currentTab];
        let icon, unit;
if (currentTab === 'uc') {
    icon = '<img src="ссылка_на_твою_иконку_uc.png" style="width: 45px; height: 45px;">';
    unit = 'UC';
}
        } else if (currentTab === 'stars') {
            icon = '⭐️';
            unit = '⭐️';
        } else {
            icon = '👑';
            unit = '';
        }

        container.innerHTML = currentProducts.map(p => `
            <div class="product-card" onclick="addToCart('${p.amount}', ${p.price}, '${currentTab}')">
                <div class="product-icon">${icon}</div>
                <div class="product-amount">${p.amount} ${unit}</div>
                <div class="price">${p.price} ₽</div>
                ${p.badge ? `<div class="premium-badge">${p.badge}</div>` : ''}
                <button class="buy-btn">В корзину</button>
            </div>
        `).join('');
    }

    function addToCart(amount, price, type) {
        let displayName = '';
        if (type === 'uc') displayName = `${amount} UC`;
        else if (type === 'stars') displayName = `${amount} ⭐️ Звёзд`;
        else displayName = `${amount} 👑 Premium`;
        
        cart.push({ name: displayName, price, type });
        updateCartUI();
        showToast(`✅ ${displayName} добавлено`);
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        updateCartUI();
        showToast('🗑️ Товар удалён');
    }

    function updateCartUI() {
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        document.getElementById('totalAmount').innerHTML = total + ' ₽';
        document.getElementById('cartCount').innerHTML = cart.length;
        
        const itemsDiv = document.getElementById('cartItems');
        if (cart.length === 0) {
            itemsDiv.innerHTML = '<div style="text-align:center;padding:40px;">🛒 Корзина пуста</div>';
        } else {
            itemsDiv.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <div><strong>${item.name}</strong><br>${item.price} ₽</div>
                    <button onclick="removeFromCart(${i})">Удалить</button>
                </div>
            `).join('');
        }
    }

    function openCart() {
        document.getElementById('cartSidebar').classList.add('open');
    }

    function closeCart() {
        document.getElementById('cartSidebar').classList.remove('open');
    }

    function checkout() {
        if (cart.length === 0) {
            showToast('❌ Корзина пуста');
            return;
        }
        const total = cart.reduce((sum, i) => sum + i.price, 0);
        document.getElementById('paymentAmount').innerHTML = total;
        document.getElementById('paymentModal').classList.add('active');
        closeCart();
    }

    function closeModal() {
        document.getElementById('paymentModal').classList.remove('active');
    }

    function confirmPayment() {
        const total = cart.reduce((sum, i) => sum + i.price, 0);
        // Формируем список товаров с типами
        const orderLines = cart.map(item => {
            return `${item.name} — ${item.price}₽`;
        }).join('%0A');
        
        // Определяем общий тип заказа для сообщения "выдачу ..."
        let productType = '';
        const hasUc = cart.some(i => i.type === 'uc');
        const hasStars = cart.some(i => i.type === 'stars');
        const hasPremium = cart.some(i => i.type === 'premium');
        
        if (hasUc && !hasStars && !hasPremium) productType = 'UC';
        else if (hasStars && !hasUc && !hasPremium) productType = 'Звёзды';
        else if (hasPremium && !hasUc && !hasStars) productType = 'Premium';
        else productType = 'товар(ы)'; // если смешанный заказ
        
        const msg = `🛒 НОВЫЙ ЗАКАЗ V1.2!%0A%0A📦 ${orderLines}%0A💰 Итого: ${total}₽%0A%0A✅ Ожидаю выдачу ${productType}`;
        window.open(`https://t.me/zvqni?text=${msg}`, '_blank');
        
        showToast('✅ Спасибо! Администратор свяжется с вами');
        closeModal();
        cart = [];
        updateCartUI();
    }

    function copyText(text) {
        navigator.clipboard.writeText(text);
        showToast('✅ Скопировано!');
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }

    // Вкладки
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentTab = tab.dataset.tab;
            renderProducts();
        });
    });

    renderProducts();
</script>
</body>
</html>
